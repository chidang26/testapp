name: Build iOS App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install iOS 18.2 Simulator Runtime
        run: |
          xcrun simctl list runtimes
          sudo xcodebuild -downloadPlatform iOS

      - name: Build for Simulator
        run: |
          xcodebuild \
            -project xcodeapptesst/xcodeapptesst.xcodeproj \
            -scheme xcodeapptesst \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -configuration Debug \
            -derivedDataPath ./build \
            build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Build for Device (unsigned)
        run: |
          xcodebuild \
            -project xcodeapptesst/xcodeapptesst.xcodeproj \
            -scheme xcodeapptesst \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath ./build \
            build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r ./build/Build/Products/Release-iphoneos/xcodeapptesst.app Payload/
          zip -r xcodeapptesst.ipa Payload
          rm -rf Payload

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: |
            xcodeapptesst.ipa
            ./build/Build/Products/**/*.app
          retention-days: 7
